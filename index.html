<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A2E56">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sudoku</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="timer-group">
      <div id="timer" class="timer">00:00</div>
      <button id="btn-pause" class="btn-pause">⏸</button>
    </div>
    <button id="btn-new-game" class="btn-new-game">Neues Spiel</button>
  </div>

  <!-- Grid -->
  <div class="grid-container">
    <div id="grid" class="grid"></div>
    <div id="pause-overlay" class="pause-overlay">Pause</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="number-row">
      <button id="num-1" class="num-btn">1</button>
      <button id="num-2" class="num-btn">2</button>
      <button id="num-3" class="num-btn">3</button>
      <button id="num-4" class="num-btn">4</button>
      <button id="num-5" class="num-btn">5</button>
      <button id="num-6" class="num-btn">6</button>
      <button id="num-7" class="num-btn">7</button>
      <button id="num-8" class="num-btn">8</button>
      <button id="num-9" class="num-btn">9</button>
    </div>
    <div class="action-row">
      <button id="btn-notes" class="action-btn">Notizen</button>
      <button id="btn-erase" class="action-btn">Löschen</button>
      <button id="btn-hint" class="action-btn">Hilfe</button>
      <button id="btn-check" class="action-btn">Aufgeben</button>
    </div>
  </div>

  <!-- Ranking toggle -->
  <div class="ranking-toggle">
    <button id="ranking-toggle-btn">Bestenliste</button>
  </div>

  <!-- Ranking panel -->
  <div id="ranking-backdrop" class="ranking-backdrop"></div>
  <div id="ranking-panel" class="ranking-panel">
    <div class="ranking-header">
      <h3>Top 10</h3>
      <button id="ranking-close-btn" class="ranking-close">&times;</button>
    </div>
    <ul id="ranking-list" class="ranking-list"></ul>
  </div>

  <!-- Completion overlay -->
  <div id="overlay" class="overlay">
    <div class="overlay-content">
      <h2>Gelöst!</h2>
      <div id="overlay-time" class="time-display">00:00</div>
      <div id="overlay-rank" class="rank-info"></div>
      <button id="btn-play-again" class="btn-play-again">Nächstes Spiel</button>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Generiere Sudoku…</div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
