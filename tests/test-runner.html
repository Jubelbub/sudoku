<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Tests</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { color: #E8E226; }
    h2 { color: #C9E0EE; margin-top: 20px; }
    .pass { color: #4dff88; }
    .fail { color: #ff4d4d; }
    .summary { margin-top: 20px; padding: 12px; border: 2px solid; border-radius: 8px; font-size: 1.1rem; }
    .summary.all-pass { border-color: #4dff88; color: #4dff88; }
    .summary.has-fail { border-color: #ff4d4d; color: #ff4d4d; }
    .test-line { padding: 2px 0; }
    .duration { color: #888; font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>Sudoku Test Suite</h1>
  <div id="output"></div>
  <div id="summary"></div>

  <script type="module">
    const output = document.getElementById('output');
    const summaryEl = document.getElementById('summary');
    let passed = 0, failed = 0, currentGroup = '';

    function group(name) {
      currentGroup = name;
      const h = document.createElement('h2');
      h.textContent = name;
      output.appendChild(h);
    }

    function assert(condition, message) {
      const div = document.createElement('div');
      div.className = 'test-line';
      if (condition) {
        passed++;
        div.innerHTML = `<span class="pass">✓</span> ${message}`;
      } else {
        failed++;
        div.innerHTML = `<span class="fail">✗</span> ${message}`;
        console.error(`FAIL: ${currentGroup} > ${message}`);
      }
      output.appendChild(div);
    }

    function assertEqual(actual, expected, message) {
      const eq = actual === expected;
      assert(eq, `${message} (expected: ${expected}, got: ${actual})`);
    }

    function showSummary() {
      const total = passed + failed;
      summaryEl.className = `summary ${failed === 0 ? 'all-pass' : 'has-fail'}`;
      summaryEl.textContent = `${passed}/${total} tests passed${failed > 0 ? `, ${failed} failed` : ''}`;
    }

    // Import modules
    const { solvePuzzle, analyzeDifficulty, isMediumDifficulty } = await import('../js/solver.js');
    const { generatePuzzle, countSolutions } = await import('../js/generator.js');
    const { createBoard } = await import('../js/board.js');
    const { getRankings, addRanking, clearRankings } = await import('../js/ranking.js');

    // --- Solver Tests ---
    group('Solver – Basic');

    // Known easy puzzle (solvable with singles only)
    const easyPuzzle = [
      [5,3,0,0,7,0,0,0,0],
      [6,0,0,1,9,5,0,0,0],
      [0,9,8,0,0,0,0,6,0],
      [8,0,0,0,6,0,0,0,3],
      [4,0,0,8,0,3,0,0,1],
      [7,0,0,0,2,0,0,0,6],
      [0,6,0,0,0,0,2,8,0],
      [0,0,0,4,1,9,0,0,5],
      [0,0,0,0,8,0,0,7,9]
    ];
    const easyResult = solvePuzzle(easyPuzzle);
    assert(easyResult.solved, 'Easy puzzle is solvable');
    assert(easyResult.solution !== null, 'Easy puzzle has a solution');

    // Verify solution is valid
    if (easyResult.solution) {
      let valid = true;
      for (let r = 0; r < 9; r++) {
        const rowSet = new Set(easyResult.solution[r]);
        if (rowSet.size !== 9) valid = false;
      }
      for (let c = 0; c < 9; c++) {
        const colSet = new Set();
        for (let r = 0; r < 9; r++) colSet.add(easyResult.solution[r][c]);
        if (colSet.size !== 9) valid = false;
      }
      assert(valid, 'Solution satisfies all Sudoku constraints');
    }

    // Already solved grid
    const solvedGrid = easyResult.solution;
    if (solvedGrid) {
      const solvedResult = solvePuzzle(solvedGrid);
      assert(solvedResult.solved, 'Already-solved grid is recognized as solved');
    }

    // Invalid puzzle (duplicate in row)
    const invalidPuzzle = [
      [5,5,0,0,7,0,0,0,0],
      [6,0,0,1,9,5,0,0,0],
      [0,9,8,0,0,0,0,6,0],
      [8,0,0,0,6,0,0,0,3],
      [4,0,0,8,0,3,0,0,1],
      [7,0,0,0,2,0,0,0,6],
      [0,6,0,0,0,0,2,8,0],
      [0,0,0,4,1,9,0,0,5],
      [0,0,0,0,8,0,0,7,9]
    ];
    const invalidResult = solvePuzzle(invalidPuzzle);
    assert(!invalidResult.solved, 'Invalid puzzle (duplicate) is unsolvable');

    group('Solver – Technique Detection');
    if (easyResult.log.length > 0) {
      const metrics = analyzeDifficulty(easyResult.log);
      assert(metrics.nakedSingles >= 0, 'Naked singles count is tracked');
      assert(metrics.hiddenSingles >= 0, 'Hidden singles count is tracked');
      assert(typeof metrics.totalEliminations === 'number', 'Total eliminations is tracked');
    }

    // --- Generator Tests ---
    group('Generator – Puzzle Creation');

    const startGen = performance.now();
    const gen = generatePuzzle();
    const genTime = performance.now() - startGen;
    const timeDiv = document.createElement('div');
    timeDiv.className = 'test-line duration';
    timeDiv.textContent = `Generation time: ${Math.round(genTime)}ms`;
    output.appendChild(timeDiv);

    assert(gen.puzzle !== null, 'Generator produces a puzzle');
    assert(gen.solution !== null, 'Generator produces a solution');

    // Count givens
    let givens = 0;
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        if (gen.puzzle[r][c] !== 0) givens++;
      }
    }
    assert(givens >= 28 && givens <= 50, `Givens count is reasonable: ${givens}`);

    // Verify solution validity
    let solValid = true;
    for (let r = 0; r < 9 && solValid; r++) {
      const s = new Set(gen.solution[r]);
      if (s.size !== 9) solValid = false;
    }
    assert(solValid, 'Generated solution satisfies row constraints');

    // Verify puzzle matches solution for givens
    let matchesOk = true;
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        if (gen.puzzle[r][c] !== 0 && gen.puzzle[r][c] !== gen.solution[r][c]) {
          matchesOk = false;
        }
      }
    }
    assert(matchesOk, 'Puzzle givens match solution');

    // Verify solvable by logic solver
    const recheck = solvePuzzle(gen.puzzle);
    assert(recheck.solved, 'Generated puzzle is solvable by logic solver');

    group('Generator – Uniqueness');
    const solCount = countSolutions(gen.puzzle);
    assertEqual(solCount, 1, 'Generated puzzle has exactly 1 solution');

    group('Generator – Difficulty');
    if (gen.difficulty) {
      assert(gen.difficulty.advancedTechniqueUses >= 3,
        `Advanced technique uses >= 3 (got ${gen.difficulty.advancedTechniqueUses})`);
    }

    // Generate a few more and check consistency
    let difficultyConsistent = true;
    for (let i = 0; i < 3; i++) {
      const g = generatePuzzle();
      const r = solvePuzzle(g.puzzle);
      if (!r.solved) { difficultyConsistent = false; break; }
      if (!isMediumDifficulty(r.log) && !g.fallback) { difficultyConsistent = false; break; }
    }
    assert(difficultyConsistent, 'Multiple generated puzzles meet medium difficulty');

    // --- Board Tests ---
    group('Board – Data Model');

    const board = createBoard(gen.puzzle, gen.solution);

    // Given cells are immutable
    const givenCell = (() => {
      for (let r = 0; r < 9; r++)
        for (let c = 0; c < 9; c++)
          if (gen.puzzle[r][c] !== 0) return [r, c];
    })();
    if (givenCell) {
      const [gr, gc] = givenCell;
      const origVal = board.getCell(gr, gc).value;
      board.setCell(gr, gc, origVal === 1 ? 2 : 1);
      assertEqual(board.getCell(gr, gc).value, origVal, 'Given cell is immutable');
    }

    // Empty cell can be set
    const emptyCell = (() => {
      for (let r = 0; r < 9; r++)
        for (let c = 0; c < 9; c++)
          if (gen.puzzle[r][c] === 0) return [r, c];
    })();
    if (emptyCell) {
      const [er, ec] = emptyCell;
      board.setCell(er, ec, 5);
      assertEqual(board.getCell(er, ec).value, 5, 'Empty cell can be set');
      board.clearCell(er, ec);
      assertEqual(board.getCell(er, ec).value, 0, 'Cell can be cleared');
    }

    // Notes
    if (emptyCell) {
      const [er, ec] = emptyCell;
      board.toggleNote(er, ec, 3);
      assert(board.getCell(er, ec).notes.has(3), 'Note can be toggled on');
      board.toggleNote(er, ec, 3);
      assert(!board.getCell(er, ec).notes.has(3), 'Note can be toggled off');
    }

    // Completion
    assert(!board.isComplete(), 'Incomplete board is not complete');

    // --- Ranking Tests ---
    group('Ranking – Persistence');

    clearRankings();
    assertEqual(getRankings().length, 0, 'Rankings start empty after clear');

    addRanking({ time: 120000, date: '26.03.2026' });
    addRanking({ time: 90000, date: '26.03.2026' });
    addRanking({ time: 150000, date: '26.03.2026' });

    const ranks = getRankings();
    assertEqual(ranks.length, 3, '3 rankings stored');
    assert(ranks[0].time <= ranks[1].time, 'Rankings sorted ascending');
    assert(ranks[1].time <= ranks[2].time, 'Rankings sorted ascending (2)');

    // Top 10 cap
    for (let i = 0; i < 10; i++) {
      addRanking({ time: 60000 + i * 1000, date: '26.03.2026' });
    }
    const capped = getRankings();
    assert(capped.length <= 10, `Rankings capped at 10 (got ${capped.length})`);

    // Formatted time
    assert(capped[0].formattedTime !== undefined, 'Rankings include formatted time');

    clearRankings();

    // --- Summary ---
    showSummary();
  </script>
</body>
</html>
